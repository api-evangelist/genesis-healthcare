aid: genesis-healthcare
name: Genesis Healthcare
description: >-
  Genesis Healthcare is a Kennett Square, Pennsylvania based provider of
  skilled nursing, transitional care, rehabilitation, and assisted/senior
  living services, operating roughly 175 to 200 centers across 17 to 18
  US states with about 27,000 employees serving more than 15,000 residents.
  Once one of the largest skilled nursing facility operators in the United
  States, Genesis Healthcare, Inc. filed for Chapter 11 bankruptcy
  protection on July 9, 2025 in the US Bankruptcy Court, citing pandemic
  aftereffects, inadequate Medicaid reimbursement, legacy liabilities from
  prior expansion, and roughly USD 8 million per month in litigation
  defense costs against more than 200 pending malpractice and wrongful
  death claims. At filing the company reported approximately USD 708
  million in secured debt, more than USD 1.5 billion in unsecured debt,
  and at least USD 259 million owed to malpractice plaintiffs. After the
  bankruptcy court rejected an insider stalking horse bid from ReGen
  Healthcare / Pinta Capital Partners in December 2025, a roughly
  USD 1 billion sale to a NewGen Health backed buyer operating as
  "101 West State Street" was approved in January 2026, with the
  restructuring still in progress as of this profile. No public developer
  APIs, OpenAPI specifications, SDKs, GitHub organization, or developer
  portal have been identified for Genesis Healthcare; the company is a
  healthcare operator, not an API provider, and its public web presence
  is limited to a corporate brochure site, careers portal, and compliance
  hotline.
